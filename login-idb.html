<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iniciar sesión — Monte Alegre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --slate:#283341;
    --slate-dark:#1E2732;
    --amber:#C77B12;
    --bg:#EEF1F7;
    --card:#F7F5F2;
    --border:#E2DDD5;
    --label:#6B6760;
    --muted:#9A968F;
    --text:#2A2A2C;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--bg); font-family:Manrope,system-ui,sans-serif; padding:32px;
  }
  .login-card{
    width:100%; max-width:480px;
    background:var(--card); border:1px solid #ECE8E2; border-radius:20px;
    padding:44px 44px 40px; box-shadow:0 24px 60px -36px rgba(40,51,65,.35);
  }
  .login-head{display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px}
  .login-logo{
    width:200px; height:200px; border-radius:32px; overflow:hidden;
    box-shadow:0 18px 42px -16px rgba(40,51,65,.5); border:1px solid #fff;
  }
  .login-logo img{width:100%; height:100%; object-fit:cover; transform:scale(1.04)}
  .login-title-org{font-weight:700; font-size:15px; letter-spacing:.04em; color:var(--slate)}
  .login-title-loc{font-weight:500; font-size:12px; letter-spacing:.12em; color:var(--muted); margin-top:5px}
  .login-divider{height:1px; background:linear-gradient(90deg,transparent,#E6E1D9,transparent); margin:30px 0 28px}
  .login-heading{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:28px; color:var(--slate); letter-spacing:.01em; margin-bottom:24px}
  .login-label{display:block; font-weight:600; font-size:12px; letter-spacing:.05em; color:var(--label); margin-bottom:8px}
  .login-input{
    width:100%; padding:13px 15px; border:1px solid var(--border); border-radius:11px;
    background:#fff; font:500 15px Manrope,sans-serif; color:var(--text);
    transition:border-color .18s, box-shadow .18s;
  }
  .login-input:focus{outline:none; border-color:var(--slate); box-shadow:0 0 0 3px rgba(40,51,65,.08)}
  .login-input::placeholder{color:#A8A6A1}
  .login-field{margin-bottom:20px}
  .login-pass{position:relative; margin-bottom:28px}
  .login-pass .login-input{padding-right:44px}
  .login-eye{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    background:none; border:none; cursor:pointer; color:var(--muted);
  }
  .login-btn{
    width:100%; padding:15px; border:none; border-radius:11px;
    background:var(--slate); color:#fff; font:600 15px Manrope,sans-serif; letter-spacing:.02em;
    cursor:pointer; box-shadow:0 12px 26px -14px rgba(40,51,65,.7);
    transition:background .2s, transform .12s, box-shadow .2s;
  }
  .login-btn:hover{background:var(--slate-dark); transform:translateY(-1px); box-shadow:0 16px 30px -14px rgba(40,51,65,.8)}
  .login-forgot{text-align:center; margin-top:18px}
  .login-forgot a{font-weight:500; font-size:13px; color:var(--amber); text-decoration:none; border-bottom:1px solid rgba(199,123,18,.3); padding-bottom:1px}
</style>
</head>
<body>
  <form class="login-card" onsubmit="return false">
    <div class="login-head">
      <div class="login-logo"><img src="assets/logo.jpeg" alt="IDB Inversiones y Desarrollos"></div>
      <div>
        <div class="login-title-org">FRACCIONAMIENTO MONTE ALEGRE</div>
        <div class="login-title-loc">AYUTLA · SAN MARCOS</div>
      </div>
    </div>

    <div class="login-divider"></div>
    <h1 class="login-heading">Iniciar sesión</h1>

    <div class="login-field">
      <label class="login-label" for="usuario">USUARIO</label>
      <input class="login-input" id="usuario" name="usuario" type="text" autocomplete="username">
    </div>

    <label class="login-label" for="password">CONTRASEÑA</label>
    <div class="login-pass">
      <input class="login-input" id="password" name="password" type="password" autocomplete="current-password">
      <button class="login-eye" type="button" aria-label="Mostrar contraseña" onclick="togglePass(this)">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </div>

    <button class="login-btn" type="submit">Entrar</button>
    <div class="login-forgot"><a href="#">¿Olvidó su contraseña?</a></div>
  </form>

  <script>
    function togglePass(btn){
      var input = btn.parentNode.querySelector('input');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
