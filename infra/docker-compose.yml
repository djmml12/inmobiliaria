services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: inmobiliaria
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - interna
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/inmobiliaria
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET requerido}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: https://${DOMAIN}
      STORAGE_PATH: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - interna
      - web
    volumes:
      - uploads:/app/uploads

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ../apps/web/dist:/srv/web:ro
    networks:
      - web
    depends_on:
      - api

networks:
  interna:
    internal: true
  web:

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  uploads:
